  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans','Noto Sans Thai','Noto Sans Myanmar', sans-serif;-webkit-font-smoothing:antialiased;}
  body[data-lang="th"]{font-family:'Noto Sans Thai','IBM Plex Sans',sans-serif;}
  body[data-lang="my"]{font-family:'Noto Sans Myanmar','IBM Plex Sans',sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 24px 80px;}
  header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--navy);padding-bottom:18px;margin-bottom:6px;flex-wrap:wrap;gap:14px;}
  .brand-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:32px;margin:0;color:var(--navy);letter-spacing:-0.01em;}
  body[data-lang="th"] h1, body[data-lang="my"] h1{font-family:'Noto Sans Thai','Noto Sans Myanmar',sans-serif;}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .header-meta{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate);line-height:1.6;}
  .header-meta b{color:var(--navy);}
  .lang-switch{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .lang-switch button{border:none;background:var(--card);padding:5px 10px;font-size:11.5px;font-weight:700;color:var(--slate);cursor:pointer;font-family:'IBM Plex Mono',monospace;}
  .lang-switch button.active{background:var(--navy);color:#fff;}
  .stale-note{background:var(--amber-soft);color:#8a5c17;border:1px solid #EBD4A3;border-radius:4px;padding:8px 12px;font-size:12px;margin:14px 0 20px;font-family:'IBM Plex Mono',monospace;}

  nav.tabs{display:flex;gap:2px;margin-bottom:22px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  nav.tabs button{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13.5px;background:none;border:none;padding:12px 16px;cursor:pointer;color:var(--slate);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.15s;}
  nav.tabs button:hover{color:var(--navy);}
  nav.tabs button.active{color:var(--navy);border-bottom-color:var(--amber);}

  .panel{display:none;} .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .toolbar label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);font-weight:600;margin-right:2px;}
  select, input[type=text]{
    font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);
    border-radius:4px;background:var(--card);color:var(--ink);
  }
  .seg{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .seg button{border:none;background:var(--card);padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--slate);cursor:pointer;font-family:inherit;}
  .seg button.active{background:var(--navy);color:#fff;}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:24px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:16px 18px;}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);font-weight:600;margin-bottom:8px;}
  .kpi .value{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--navy);line-height:1.1;}
  body[data-lang="th"] .kpi .value, body[data-lang="my"] .kpi .value{font-family:'Noto Sans Thai','Noto Sans Myanmar',sans-serif;}
  .kpi .sub{font-family:'IBM Plex Mono',monospace;font-size:11.5px;margin-top:6px;color:var(--slate);}
  .kpi .sub.up{color:var(--teal);} .kpi .sub.down{color:var(--red);}

  .section{margin-bottom:30px;}
  .section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--navy);margin:0 0 4px;display:flex;align-items:baseline;gap:8px;}
  body[data-lang="th"] .section-title, body[data-lang="my"] .section-title{font-family:'Noto Sans Thai','Noto Sans Myanmar',sans-serif;}
  .section-title .num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--amber);font-weight:600;}
  .section-desc{font-size:13px;color:var(--slate);margin:0 0 14px;max-width:640px;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:820px){.grid-2,.grid-3{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:18px;}
  .chart-wrap{position:relative;height:230px;} .chart-wrap.tall{height:280px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);font-weight:600;padding:8px 10px;border-bottom:1.5px solid var(--navy);}
  td{padding:9px 10px;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  td.name{font-family:'IBM Plex Sans',sans-serif;font-weight:500;font-size:13px;}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
  .pill.good{background:var(--teal-soft);color:var(--teal);}
  .pill.warn{background:var(--amber-soft);color:var(--amber);}
  .pill.risk{background:var(--red-soft);color:var(--red);}
  .pill.prod{background:#EDEBFA;color:#4A3F9E;}

  .insight-panel{background:var(--navy);border-radius:4px;padding:22px 24px;color:#EDEFF3;margin-top:6px;}
  .insight-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .insight-head .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);}
  .insight-head .t{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#B9C4D6;}
  .insight-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
  .insight-list li{padding-left:18px;position:relative;font-size:13.5px;line-height:1.55;color:#DEE3EC;}
  .insight-list li::before{content:'—';position:absolute;left:0;top:0;color:var(--amber);font-weight:700;}
  .insight-list b{color:#fff;}
  .insight-list .tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border-radius:3px;margin-right:6px;background:rgba(255,255,255,.1);color:#B9C4D6;position:relative;top:-1px;}
  .insight-list .tag.act{background:rgba(201,138,44,.25);color:#F3D08F;}

  .empty-state{padding:40px 20px;text-align:center;color:var(--slate);font-size:13.5px;}
  .empty-state b{color:var(--navy);}

  .roster-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap;}
  .roster-row:last-child{border-bottom:none;}
  .roster-left{display:flex;flex-direction:column;}
  .roster-left .cn{font-weight:600;font-size:13.5px;}
  .roster-left .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate);}
  .roster-right{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;}

  footer{margin-top:40px;font-size:11.5px;color:var(--slate);font-family:'IBM Plex Mono',monospace;text-align:center;}

  .install-banner{
    display:none;background:var(--navy-soft);color:#EDEFF3;border-radius:6px;
    padding:12px 14px;margin-bottom:16px;font-size:12.5px;line-height:1.5;
    align-items:center;gap:10px;
  }
  .install-banner.show{display:flex;}
  .install-banner b{color:#F3D08F;}
  .install-banner button{
    margin-left:auto;background:none;border:1px solid rgba(255,255,255,.3);color:#EDEFF3;
    border-radius:4px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;
  }
  .install-banner .go-btn{background:var(--amber);border-color:var(--amber);color:#101B33;font-weight:700;}

  .bottom-nav{
    display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    box-shadow:0 -2px 10px rgba(16,27,51,.06);
  }
  .bottom-nav-row{display:flex;justify-content:space-around;}
  .bottom-nav button{
    background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--slate);font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:600;
    padding:6px 4px;flex:1;cursor:pointer;
  }
  .bottom-nav button .ic{width:18px;height:18px;border-radius:5px;background:var(--line);}
  .bottom-nav button.active{color:var(--navy);}
  .bottom-nav button.active .ic{background:var(--amber);}

  @media(max-width:720px){
    .wrap{padding:16px 14px calc(84px + env(safe-area-inset-bottom));}
    header{align-items:flex-start;padding-bottom:14px;}
    h1{font-size:23px;}
    .header-right{align-items:flex-start;width:100%;}
    .header-meta{text-align:left;font-size:11px;}
    .brand-eyebrow{font-size:9.5px;}
    nav.tabs{display:none;}
    .bottom-nav{display:block;}
    .kpi-row{grid-template-columns:repeat(2,1fr);gap:9px;}
    .kpi{padding:12px 13px;}
    .kpi .value{font-size:21px;}
    .kpi .label{font-size:9.5px;}
    .section-title{font-size:16px;}
    .card{padding:13px;overflow-x:auto;}
    table{min-width:520px;}
    .toolbar{gap:8px;}
    .toolbar select, .toolbar input[type=text]{min-height:38px;flex:1 1 auto;}
    .seg button{padding:8px 12px;min-height:38px;}
    .insight-panel{padding:16px;}
    .roster-row{padding:10px 4px;}
    .chart-wrap{height:200px;} .chart-wrap.tall{height:240px;}
    .stale-note{font-size:11px;}
  }

  .load-screen{padding:80px 20px;text-align:center;}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--amber);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-screen .msg{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--slate);}
  .error-screen{background:var(--red-soft);border:1px solid #EBC0B4;border-radius:6px;padding:22px;text-align:center;color:#7A2E1D;}
  .error-screen h3{font-family:'Fraunces',serif;margin:0 0 8px;font-size:17px;}
  .error-screen p{font-size:13px;margin:0 0 14px;line-height:1.5;}
  .error-screen button{background:var(--navy);color:#fff;border:none;border-radius:4px;padding:9px 16px;font-weight:600;font-size:12.5px;cursor:pointer;}
</style>
</head>
<body id="bodyEl">
<div class="wrap">
  <header>
    <div>
      <div class="brand-eyebrow"><span class="live-dot"></span><span data-i18n="brand_eyebrow"></span></div>
      <h1 data-i18n="h1"></h1>
    </div>
    <div class="header-right">
      <div class="lang-switch" id="langSwitch">
        <button data-lang-btn="en">EN</button>
        <button data-lang-btn="th">ไทย</button>
        <button data-lang-btn="my">မြန်မာ</button>
      </div>
      <div class="header-meta" id="headerMeta"></div>
    </div>
  </header>
  <div class="stale-note" id="staleNote"></div>
  <div class="install-banner" id="installBanner">
    <span id="installText"></span>
    <button id="installDismiss" data-i18n="install_dismiss"></button>
    <button class="go-btn" id="installGo" style="display:none" data-i18n="install_add"></button>
  </div>

  <div id="loadingScreen" class="load-screen">
    <div class="spinner"></div>
    <div class="msg" data-i18n="loading_msg"></div>
  </div>
  <div id="errorScreen" class="error-screen" style="display:none">
    <h3 data-i18n="error_title"></h3>
    <p id="errorMsg" data-i18n="error_default"></p>
    <button onclick="boot()" data-i18n="error_retry"></button>
  </div>

  <div id="appContent" style="display:none">
  <nav class="tabs" id="tabs">
    <button data-tab="overview" class="active" data-i18n="nav_overview"></button>
    <button data-tab="bm" data-i18n="nav_bm"></button>
    <button data-tab="lo" data-i18n="nav_lo"></button>
    <button data-tab="cs" data-i18n="nav_cs"></button>
    <button data-tab="fc" data-i18n="nav_fc"></button>
  </nav>

  <div class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-row">
      <button data-tab="overview" class="active"><span class="ic"></span><span data-i18n="navs_overview"></span></button>
      <button data-tab="bm"><span class="ic"></span><span data-i18n="navs_bm"></span></button>
      <button data-tab="lo"><span class="ic"></span><span data-i18n="navs_lo"></span></button>
      <button data-tab="cs"><span class="ic"></span><span data-i18n="navs_cs"></span></button>
      <button data-tab="fc"><span class="ic"></span><span data-i18n="navs_fc"></span></button>
    </div>
  </div>

  <!-- ================= OVERVIEW ================= -->
  <div class="panel active" id="panel-overview">
    <div class="kpi-row" id="ovKpis"></div>

    <div class="grid-2 section">
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">01</span> <span data-i18n="section_product_mix"></span></h2>
        <p class="section-desc" style="margin-bottom:10px" data-i18n="section_product_mix_desc"></p>
        <table>
          <thead><tr><th data-i18n="th_product"></th><th data-i18n="th_active_loans"></th><th data-i18n="th_portfolio"></th><th data-i18n="th_overdue_now"></th><th data-i18n="th_chronic"></th></tr></thead>
          <tbody id="productTable"></tbody>
        </table>
      </div>
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">02</span> <span data-i18n="section_portfolio_branch"></span></h2>
        <div class="chart-wrap"><canvas id="branchChart"></canvas></div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title"><span class="num">03</span> <span data-i18n="section_trend"></span></h2>
      <p class="section-desc" data-i18n="section_trend_desc"></p>
      <div class="card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
    </div>

    <div class="insight-panel">
      <div class="insight-head"><span class="dot"></span><span class="t" data-i18n="insight_overview_header"></span></div>
      <ul class="insight-list" id="ovInsights"></ul>
    </div>
  </div>

  <!-- ================= BRANCH MANAGER ================= -->
  <div class="panel" id="panel-bm">
    <div class="toolbar">
      <label data-i18n="toolbar_product"></label>
      <div class="seg" id="bmProductSeg">
        <button data-p="all" class="active" data-i18n="seg_all"></button>
        <button data-p="bw" data-i18n="label_bw"></button>
        <button data-p="mo" data-i18n="label_mo"></button>
      </div>
    </div>
    <div class="section">
      <h2 class="section-title"><span class="num">01</span> <span data-i18n="section_branch_scorecard"></span></h2>
      <div class="card">
        <table>
          <thead><tr><th data-i18n="th_branch"></th><th data-i18n="th_active_loans"></th><th data-i18n="th_active_portfolio"></th><th data-i18n="th_collection_rate"></th><th data-i18n="th_overdue_now"></th><th data-i18n="th_chronic_misses"></th></tr></thead>
          <tbody id="branchTable"></tbody>
        </table>
      </div>
    </div>
    <div class="grid-2 section">
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">02</span> <span data-i18n="section_rate_by_branch"></span></h2>
        <div class="chart-wrap"><canvas id="branchRateChart"></canvas></div>
      </div>
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">03</span> <span data-i18n="section_overdue_by_branch"></span></h2>
        <div class="chart-wrap"><canvas id="branchOverdueChart"></canvas></div>
      </div>
    </div>
    <div class="insight-panel">
      <div class="insight-head"><span class="dot"></span><span class="t" data-i18n="insight_bm_header"></span></div>
      <ul class="insight-list" id="bmInsights"></ul>
    </div>
  </div>

  <!-- ================= LOAN OFFICER ================= -->
  <div class="panel" id="panel-lo">
    <div class="toolbar">
      <label data-i18n="toolbar_view"></label>
      <select id="loSelect"><option value="" data-i18n="select_all_officers"></option></select>
    </div>

    <div id="loLeaderboardView">
      <div class="section">
        <h2 class="section-title"><span class="num">01</span> <span data-i18n="section_leaderboard"></span></h2>
        <p class="section-desc" data-i18n="section_leaderboard_desc"></p>
        <div class="card"><table><thead><tr><th data-i18n="th_loan_officer"></th><th data-i18n="th_branch"></th><th data-i18n="th_active_loans"></th><th data-i18n="th_portfolio"></th><th data-i18n="th_overdue"></th><th data-i18n="th_chronic"></th><th data-i18n="th_collection_rate"></th></tr></thead><tbody id="loTable"></tbody></table></div>
      </div>
      <div class="section">
        <h2 class="section-title"><span class="num">02</span> <span data-i18n="section_rate_by_officer"></span></h2>
        <div class="card"><div class="chart-wrap tall"><canvas id="loChart"></canvas></div></div>
      </div>
      <div class="insight-panel">
        <div class="insight-head"><span class="dot"></span><span class="t" data-i18n="insight_lo_header"></span></div>
        <ul class="insight-list" id="loInsights"></ul>
      </div>
    </div>

    <div id="loPersonalView" style="display:none">
      <div class="kpi-row" id="loPersonalKpis"></div>
      <div class="section">
        <h2 class="section-title"><span class="num">01</span> <span data-i18n="section_my_notifications"></span></h2>
        <p class="section-desc" data-i18n="section_my_notifications_desc"></p>
        <div class="card" style="padding:6px 18px" id="loNotifications"></div>
      </div>
    </div>
  </div>

  <!-- ================= CUSTOMER SERVICE ================= -->
  <div class="panel" id="panel-cs">
    <div class="kpi-row" id="csKpis"></div>
    <div class="grid-2 section">
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">01</span> <span data-i18n="section_first_vs_rollover"></span></h2>
        <div class="chart-wrap"><canvas id="rolloverChart"></canvas></div>
      </div>
      <div class="card">
        <h2 class="section-title" style="font-size:16px"><span class="num">02</span> <span data-i18n="section_loan_cycle"></span></h2>
        <div class="chart-wrap"><canvas id="cycleChart"></canvas></div>
      </div>
    </div>
    <div class="insight-panel">
      <div class="insight-head"><span class="dot"></span><span class="t" data-i18n="insight_cs_header"></span></div>
      <ul class="insight-list" id="csInsights"></ul>
    </div>
  </div>

  <!-- ================= FIELD COLLECTION ================= -->
  <div class="panel" id="panel-fc">
    <div class="kpi-row" id="fcKpis"></div>
    <div class="toolbar">
      <label data-i18n="toolbar_branch"></label>
      <select id="fcBranchSelect"><option value="" data-i18n="all_branches"></option></select>
      <label data-i18n="toolbar_type"></label>
      <div class="seg" id="fcTypeSeg">
        <button data-t="all" class="active" data-i18n="seg_all"></button>
        <button data-t="overdue" data-i18n="seg_overdue"></button>
        <button data-t="upcoming_maturity" data-i18n="seg_maturing"></button>
      </div>
      <input type="text" id="fcSearch" data-i18n-placeholder="search_placeholder" style="flex:1;min-width:180px">
    </div>
    <div class="section">
      <h2 class="section-title"><span class="num">01</span> <span data-i18n="section_field_visit"></span></h2>
      <div class="card" style="padding:6px 18px" id="fcList"></div>
    </div>
    <div class="insight-panel">
      <div class="insight-head"><span class="dot"></span><span class="t" data-i18n="insight_fc_header"></span></div>
      <ul class="insight-list" id="fcInsights"></ul>
    </div>
  </div>

  <footer id="footerNote" data-i18n="footer_note"></footer>
  </div><!-- /appContent -->
</div>

<script>
/* ===================== TRANSLATIONS ===================== */
const TR = {
en: {
  brand_eyebrow: "Live data · Samut Sakhon Province",
  h1: "Branch Collection Dashboard",
  install_dismiss: "Dismiss", install_add: "Add",
  loading_msg: "Pulling latest data from Google Sheets…",
  error_title: "Couldn't load live data",
  error_default: "The published sheet links may need to be checked, or your connection dropped.",
  error_retry: "Retry",
  nav_overview: "Overview", nav_bm: "Branch Manager", nav_lo: "My Portfolio (Loan Officer)", nav_cs: "Customer Service", nav_fc: "Field Collection",
  navs_overview: "Overview", navs_bm: "Branch", navs_lo: "Mine", navs_cs: "Service", navs_fc: "Field",

function detectLang(){
  const n = (navigator.language||'en').toLowerCase();
  if(n.startsWith('th')) return 'th';
  if(n.startsWith('my')) return 'my';
  return 'en';
}
let LANG = detectLang();

/* L(en, th, my) — pick the right pre-built string/value for the current language.

const BW_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-XruRD3ezUVheTz5BlnP6SB8Ck5Z5uaBOTShu2NZioP0drU4piwPJcjmeFqMS4cx1pKAc02R6Qr5D/pub?gid=0&single=true&output=csv";
const MO_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQemm_h3dESrgn4dTuIS-XfMYLgvetzHtz4qt3PQ4jQRPHb_HFdJcrL0V-gTWyCEN-z5FEF241VgasP/pub?gid=0&single=true&output=csv";

let DATA = null;

function toNum(v){ if(v===undefined||v===null||v==='') return null; const n = Number(String(v).replace(/,/g,'').trim()); return isNaN(n)?null:n; }

function parseDate(v){
  if(!v) return null;
  v = String(v).trim();
  let m = v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){
    let a=+m[1], b=+m[2], y=+m[3];
    if(a>12) return new Date(y, b-1, a);   // D/M/Y
    return new Date(y, a-1, b);            // assume M/D/Y (Sheets default)
  }
  const d = new Date(v);
  return isNaN(d) ? null : d;
}

async function fetchCSV(url, label){
  const res = await fetch(url, {cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status+' fetching '+label+' CSV');
  const text = await res.text();
  const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
  const required = ['Loan Id','Client Name','Branch','Assignee','Loan Amount','Close?'];
  const missing = required.filter(c => !parsed.meta.fields.includes(c));
  if(missing.length){
    throw new Error(label+' sheet is missing expected columns ('+missing.join(', ')+') — this usually means the wrong tab got published. Re-check Publish to web and make sure "Data" is selected, not the default/first tab.');
  }
  return {rows: parsed.data, headers: parsed.meta.fields};
}

/* Period columns are detected dynamically from headers so new bi-weekly/monthly
   cycles that get added to the sheet over time are picked up automatically —
   nothing needs to be hardcoded or re-published on this end. */
const BW_CORE = new Set(['Due','Loan Id','Borrower Id','Contract No','Client Name','Phone Number','Province','Branch','Disbursed Date','Loan Amount','Loan End Date','Assignee','Loan Cycle','1st Loan vs Rollover','Created At','Close Contract','Close?']);
function detectBwPeriods(headers){ return headers.filter(h => !BW_CORE.has(h) && /^\d{1,2}\/\d{1,2}$/.test(h)); }
function detectMoPeriods(headers){ return headers.filter(h => /^Due \d{1,2}\/\d{1,2}$/.test(h)); }

function tagRows(rows, periods, productName){
  rows.forEach(r=>{
    let val=null, npc=0;
    periods.forEach(p=>{
      const v = r[p];
      if(v!==undefined && v!==null && v!==''){ val=v; if(v==='Not paid') npc++; }
    });
    r.__latest_status = val;
    r.__notpaid_count = npc;
    r.__product = productName;
  });
  return rows;
}

function kpisFor(rows){
  const active = rows.filter(r=>r['Close?']==='No');
  const overdue = rows.filter(r=>r.__latest_status==='Not paid');
  const chronic = rows.filter(r=>r.__notpaid_count>=2);
  const sum = (arr,key)=>arr.reduce((s,r)=> s+(toNum(r[key])||0),0);
  return {
    total_loans_ever: rows.length,
    active_loans: active.length,
    closed_loans: rows.filter(r=>r['Close?']==='Yes').length,
    active_portfolio: Math.round(sum(active,'Loan Amount')),
    total_disbursed_alltime: Math.round(sum(rows,'Loan Amount')),
    avg_loan_size: rows.length ? Math.round(sum(rows,'Loan Amount')/rows.length) : 0,
    overdue_now: overdue.length,
    overdue_amount: Math.round(sum(overdue,'Loan Amount')),
    chronic_loans: chronic.length,
    chronic_amount: Math.round(sum(chronic,'Loan Amount')),
    rollover_share_pct: rows.length ? Math.round(1000*rows.filter(r=>r['1st Loan vs Rollover']==='Rollover').length/rows.length)/10 : 0
  };
}

function trendFor(rows, periods){
  return periods.map(p=>{
    const s = rows.map(r=>r[p]).filter(v=>v!==undefined && v!==null && v!=='');
    const active = s.filter(v=>v!=='Close');
    const tot = active.length;
    const paid = active.filter(v=>v==='Paid').length;
    return {
      period:p, total:tot, paid,
      not_paid: active.filter(v=>v==='Not paid').length,
      partial: active.filter(v=>v==='Partial').length,
      writeoff: active.filter(v=>v==='Write-off').length,
      collection_rate: tot ? Math.round(1000*paid/tot)/10 : null
    };
  });
}

function branchBlock(rows){
  const byBranch = {};
  rows.forEach(r=>{ const b=r['Branch']||'—'; (byBranch[b]=byBranch[b]||[]).push(r); });
  const out = Object.entries(byBranch).map(([branch,g])=>{
    const active = g.filter(r=>r['Close?']==='No');
    const overdue = g.filter(r=>r.__latest_status==='Not paid');
    const chronic = g.filter(r=>r.__notpaid_count>=2);
    const denom = g.filter(r=>['Paid','Not paid','Partial'].includes(r.__latest_status)).length;
    const paidCt = g.filter(r=>r.__latest_status==='Paid').length;
    return {
      branch,
      active_loans: active.length,
      portfolio: Math.round(active.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      overdue_count: overdue.length,
      overdue_amount: Math.round(overdue.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      chronic_count: chronic.length,
      chronic_amount: Math.round(chronic.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      collection_rate_latest: denom ? Math.round(1000*paidCt/denom)/10 : 0
    };
  });
  return out.sort((a,b)=>b.portfolio-a.portfolio);
}

function loBlock(rows, minLoans=3){
  const byLO = {};
  rows.forEach(r=>{ const lo=r['Assignee']||'—'; (byLO[lo]=byLO[lo]||[]).push(r); });
  const out=[];
  Object.entries(byLO).forEach(([lo,g])=>{
    if(lo==='CO'||lo==='BB') return;
    const active = g.filter(r=>r['Close?']==='No');
    if(active.length<minLoans) return;
    const overdue = g.filter(r=>r.__latest_status==='Not paid');
    const chronic = g.filter(r=>r.__notpaid_count>=2);
    const denom = g.filter(r=>['Paid','Not paid','Partial'].includes(r.__latest_status)).length;
    const paidCt = g.filter(r=>r.__latest_status==='Paid').length;
    const counts={}; g.forEach(r=>{ const b=r['Branch']||'—'; counts[b]=(counts[b]||0)+1; });
    const branch = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    out.push({
      lo, branch,
      active_loans: active.length,
      portfolio: Math.round(active.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      disbursed_alltime: Math.round(g.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      overdue_count: overdue.length,
      overdue_amount: Math.round(overdue.reduce((s,r)=>s+(toNum(r['Loan Amount'])||0),0)),
      chronic_count: chronic.length,
      collection_rate: denom ? Math.round(1000*paidCt/denom)/10 : 0
    });
  });
  return out.sort((a,b)=>a.collection_rate-b.collection_rate);
}

function rosterFor(rows, today){
  const out=[];
  rows.forEach(r=>{
    if(r['Assignee']==='CO'||r['Assignee']==='BB') return;
    let type=null;
    if(r.__latest_status==='Not paid') type='overdue';
    else if(r['Close?']==='No'){
      const end = parseDate(r['Loan End Date']);
      if(end){ const days = Math.round((end-today)/86400000); if(days>=0 && days<=15) type='upcoming_maturity'; }
    }
    if(type){
      const end = parseDate(r['Loan End Date']);
      out.push({
        lo:r['Assignee'], branch:r['Branch'], product:r.__product,
        client_name: r['Client Name']||null,
        phone: r['Phone Number']||null,
        contract_no: String(r['Contract No']||''),
        loan_amount: Math.round(toNum(r['Loan Amount'])||0),
        loan_end_date: end ? end.toISOString().slice(0,10) : null,
        notpaid_count: r.__notpaid_count,
        type
      });
    }
  });
  return out;
}

function valueCounts(rows, key){
  const c={}; rows.forEach(r=>{ const v=r[key]||'—'; c[v]=(c[v]||0)+1; }); return c;
}
function firstVsRollover(rows){
  const c={};
  rows.forEach(r=>{ const v=r['1st Loan vs Rollover']||'—'; if(!c[v]) c[v]={count:0,amount:0}; c[v].count++; c[v].amount+=toNum(r['Loan Amount'])||0; });
  return Object.entries(c).map(([key,v])=>({'1st Loan vs Rollover':key, count:v.count, amount:Math.round(v.amount)}));
}

async function buildData(){
  const [bw, mo] = await Promise.all([fetchCSV(BW_CSV_URL,'Bi-weekly'), fetchCSV(MO_CSV_URL,'Monthly')]);
  const bwPeriods = detectBwPeriods(bw.headers);
  const moPeriodsRaw = detectMoPeriods(mo.headers);
  const moPeriods = moPeriodsRaw.map(h=>h.replace('Due ',''));
  // normalize monthly headers to bare period labels, same as bi-weekly
  mo.rows.forEach(r=>{ moPeriodsRaw.forEach(h=>{ r[h.replace('Due ','')] = r[h]; }); });

  tagRows(bw.rows, bwPeriods, 'Bi-weekly');
  tagRows(mo.rows, moPeriods, 'Monthly');
  const combined = bw.rows.concat(mo.rows);

  const today = new Date();

  return {
    as_of: today.toISOString().slice(0,10),
    kpis_all: kpisFor(combined), kpis_bw: kpisFor(bw.rows), kpis_mo: kpisFor(mo.rows),
    trend_bw: trendFor(bw.rows, bwPeriods), trend_mo: trendFor(mo.rows, moPeriods),
    branches_all: branchBlock(combined), branches_bw: branchBlock(bw.rows), branches_mo: branchBlock(mo.rows),
    los_all: loBlock(combined),
    roster: rosterFor(combined, today),
    loan_cycle: valueCounts(combined, 'Loan Cycle'),
    first_vs_rollover: firstVsRollover(combined)
  };
}

    );

}

/* Chart creation must NEVER be allowed to throw and halt the rest of the script —
   every other section (tables, KPI cards, notification lists, insights) is more
   important than the charts and must render regardless of chart library status. */
function safeChart(canvasId, config){
  try{
    if(typeof Chart === 'undefined'){
      const el = document.getElementById(canvasId);
      if(el && el.parentElement) el.parentElement.insertAdjacentHTML('beforeend','<div class="empty-state" style="padding:16px">'+L('Chart library did not load — data tables below are unaffected.','ไลบรารีกราฟโหลดไม่สำเร็จ — ตารางข้อมูลด้านล่างยังใช้งานได้ตามปกติ','ဂရပ်ဖ် library ဖွင့်၍မရပါ — အောက်ပါဒေတာဇယားများ ထိခိုက်မှုမရှိပါ။')+'</div>');
      return null;
    }
    const el = document.getElementById(canvasId);
    if(!el) return null;
    return new Chart(el, config);
  }catch(e){
    console.error('Chart render failed for', canvasId, e);
    return null;
  }
}

  const box = document.getElementById('fcList');
  if(items.length===0){ box.innerHTML = `<div class="empty-state">${t.empty_no_cases}</div>`; return; }
  box.innerHTML = items.slice(0,150).map(it=>`
    <div class="roster-row">

        <span class="cn">${it.client_name||'—'} <span class="pill ${it.type==='overdue'?'risk':'warn'}" style="margin-left:6px">${it.type==='overdue'? L(`Overdue · ${it.notpaid_count}x`,`ค้างชำระ · ${it.notpaid_count} ครั้ง`,`ကျော်လွန် · ${it.notpaid_count} ကြိမ်`) : L(`Maturing ${it.loan_end_date}`,`ครบกำหนด ${it.loan_end_date}`,`သက်တမ်းကုန် ${it.loan_end_date}`)}</span> <span class="pill prod">${it.product}</span></span>
        <span class="meta">${it.phone||L('no phone','ไม่มีเบอร์โทร','ဖုန်းနံပါတ်မရှိ')} · ${L(`contract ${it.contract_no}`,`สัญญา ${it.contract_no}`,`စာချုပ် ${it.contract_no}`)} · ${L(`officer ${shortLO(it.lo)}`,`เจ้าหน้าที่ ${shortLO(it.lo)}`,`အရာရှိ ${shortLO(it.lo)}`)} · ${it.branch.replace('Samut Sakhon ','')}</span>
      </div>
      <div class="roster-right">${fmtTHB(it.loan_amount)}</div>
    </div>`).join('') + (items.length>150 ? `<div class="empty-state">${L(`Showing first 150 of ${items.length} matches — narrow with branch/search.`,`แสดง 150 รายการแรกจากทั้งหมด ${items.length} รายการ — จำกัดผลด้วยสาขา/การค้นหา`,`ကိုက်ညီမှု ${items.length} ခုအနက် ပထမ ၁၅၀ ကို ပြသနေသည် — ဌာနခွဲ/ရှာဖွေမှုဖြင့် ကျဉ်းအောင်ပြုလုပ်ပါ။`)}</div>` : '');
}
